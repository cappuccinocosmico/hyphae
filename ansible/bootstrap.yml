---
# Hyphae Phase 1: Bootstrap playbook
# Brings any bare Linux node (non-NixOS) to a state where Nomad, Consul, and
# Netbird are running under systemd and ready for Nomad job specs (Phase 2).
#
# Usage:
#   nix develop   # ensure sops, age, ansible are in PATH
#   ansible-playbook bootstrap.yml -l <node>
#
# Prerequisites:
#   - inventory_hostname must match a key in flake.nix systemConfigs
#   - secrets/devices/{{ inventory_hostname }}.yaml must exist (sops-encrypted)
#   - secrets/cluster.yaml must exist (sops-encrypted)
#   - Operator age key must be accessible to sops
#     (SOPS_AGE_KEY_FILE or ~/.config/sops/age/keys.txt)
#
# NixOS nodes (vps1, etc.) are NOT bootstrapped via this playbook.
# Deploy them with nixos-anywhere — see nix/hosts/<hostname>/configuration.nix.

- name: Bootstrap hyphae cluster node
  hosts: all
  become: true

  roles:
    # 1. System users, fuse kernel module, /etc/hyphae directory
    #    (kernel-level and user management; cannot be done by Nix)
    - role: common

    # 2. Install Nix daemon; run system-manager switch to deploy all services
    #    (writes systemd units and /etc files defined in nix/modules/)
    - role: nix

    # 3. Write age key + encrypted secrets; restart sops-install-secrets to decrypt
    - role: hyphae-secrets

    # 4. Write netbird.env; restart netbird service; enroll into mesh
    - role: netbird
