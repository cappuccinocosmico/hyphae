---
# URL of the self-hosted Netbird management server.
# Update this once vps1 is deployed and DNS is live.
netbird_management_url: "https://netbird.mycor.io"

# Path to the cluster-wide encrypted secrets file.
# Copied by hyphae-secrets role to /etc/hyphae/cluster.yaml on each node.
# (hyphae_secrets_file is no longer used; paths are now hardcoded in the role.)

# NOTE: inventory_hostname must match a key in flake.nix systemConfigs so that
# the nix role can run: nix run /opt/hyphae#system-manager -- switch --flake /opt/hyphae#<hostname>
#
# NixOS nodes (vps1, etc.) must NOT be in this inventory — they are managed
# via nixos-anywhere + nixos-rebuild, not Ansible.
