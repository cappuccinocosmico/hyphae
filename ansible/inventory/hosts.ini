# Hyphae cluster inventory
# Fill in ansible_host values for each node before running bootstrap.yml.
# Generate suggested host_vars with: ./bootstrap-detect.sh

[vps]
# vps1 ansible_host=YOUR_VPS_IP

[storage]
# storage1 ansible_host=192.168.1.x
# storage2 ansible_host=192.168.1.y

[light]
# light1 ansible_host=192.168.1.z
# light2 ansible_host=192.168.1.w

[gpu]
# gpu1 ansible_host=192.168.1.v

# Convenience group containing every node
[all:children]
vps
storage
light
gpu
