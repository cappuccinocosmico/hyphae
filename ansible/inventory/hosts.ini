# Hyphae cluster inventory
# Fill in ansible_host values for each node before running bootstrap.yml.
#
# NOTE: vps1 is a NixOS host managed via nixos-anywhere + nixos-rebuild.
# It does NOT belong in this inventory — do NOT add it here.
# See nix/hosts/vps1/configuration.nix for its config.

[storage]
# storage1 ansible_host=192.168.1.x

[light]
# light1 ansible_host=192.168.1.z
# light2 ansible_host=192.168.1.w

[gpu]
# gpu1 ansible_host=192.168.1.v

# Convenience group containing every non-NixOS node
[all:children]
storage
light
gpu
